# XcodeGen spec — generates HelloDigitalBusinessCard.xcodeproj reproducibly.
# Install:  brew install xcodegen   then   xcodegen generate
name: HelloDigitalBusinessCard
options:
  bundleIdPrefix: nl.gbict
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top

settings:
  base:
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "476FB5QW34"
    SWIFT_VERSION: "5.0"
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    GENERATE_INFOPLIST_FILE: NO

packages:
  swift-certificates:
    url: https://github.com/apple/swift-certificates.git
    from: "1.19.3"
  swift-crypto:
    url: https://github.com/apple/swift-crypto.git
    from: "3.12.3"
  ZIPFoundation:
    url: https://github.com/weichsel/ZIPFoundation.git
    from: "0.9.20"

targets:
  HelloDigitalBusinessCard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HelloDigitalBusinessCard
    dependencies:
      - package: swift-certificates
        product: X509
      - package: swift-crypto
        product: Crypto
      - package: swift-crypto
        product: _CryptoExtras
      - package: ZIPFoundation
        product: ZIPFoundation
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: nl.gbict.hellodigitalbusinesscard
        PRODUCT_NAME: "Hello Digital Business Card"
        INFOPLIST_FILE: HelloDigitalBusinessCard/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: HelloDigitalBusinessCard/Resources/HelloDigitalBusinessCard.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: NO
        # Automatic signing — the App Store Connect API key + -allowProvisioningUpdates
        # lets Xcode create/download the certificate and profile on CI.
        CODE_SIGN_STYLE: Automatic
