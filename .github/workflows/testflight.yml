name: Deploy to TestFlight

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: testflight-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build & upload
    runs-on: macos-15
    timeout-minutes: 40

    env:
      APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
      APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
      APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Inject Wallet signing certificates (optional)
        env:
          PASS_CERTIFICATE_PEM_BASE64: ${{ secrets.PASS_CERTIFICATE_PEM_BASE64 }}
          PASS_KEY_PEM_BASE64: ${{ secrets.PASS_KEY_PEM_BASE64 }}
          WWDR_PEM_BASE64: ${{ secrets.WWDR_PEM_BASE64 }}
        run: |
          RES="HelloDigitalBusinessCard/Resources"
          if [ -n "$PASS_CERTIFICATE_PEM_BASE64" ] && [ -n "$PASS_KEY_PEM_BASE64" ] && [ -n "$WWDR_PEM_BASE64" ]; then
            echo -n "$PASS_CERTIFICATE_PEM_BASE64" | base64 --decode > "$RES/pass_certificate.pem"
            echo -n "$PASS_KEY_PEM_BASE64"         | base64 --decode > "$RES/pass_key.pem"
            echo -n "$WWDR_PEM_BASE64"             | base64 --decode > "$RES/wwdr.pem"
            echo "Wallet signing certificates injected."
          else
            echo "No Wallet certs set — building without the Add to Wallet button."
          fi

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Set up Ruby & fastlane
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: "3.2"
          bundler-cache: true

      - name: Write App Store Connect API key
        env:
          APP_STORE_CONNECT_API_KEY: ${{ secrets.APP_STORE_CONNECT_API_KEY }}
        run: |
          KEY_PATH="$RUNNER_TEMP/AuthKey.p8"
          # Accept either the raw .p8 contents or a base64-encoded blob.
          if printf '%s' "$APP_STORE_CONNECT_API_KEY" | grep -q "BEGIN PRIVATE KEY"; then
            printf '%s' "$APP_STORE_CONNECT_API_KEY" > "$KEY_PATH"
          else
            printf '%s' "$APP_STORE_CONNECT_API_KEY" | base64 --decode > "$KEY_PATH"
          fi
          echo "AUTH_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build & upload to TestFlight
        run: bundle exec fastlane beta

      - name: Upload build logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs
          path: |
            ~/Library/Logs/gym/
            fastlane/report.xml
          if-no-files-found: ignore
